<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>盛世天下：女帝篇</title>
  <style>
    :root {
      --bg: #efe7dc;
      --sidebar: #211813;
      --sidebar-soft: #30231c;
      --panel: #fffaf2;
      --paper: #fffdf8;
      --ink: #19140f;
      --ink-soft: #33271f;
      --muted: #756b5b;
      --line: #dacbb6;
      --line-soft: #eadfce;
      --gold: #a67421;
      --gold-soft: #f6ead0;
      --red: #9c2f2f;
      --blue: #2e6679;
      --green: #44715a;
      --serif: "Noto Serif SC", "Source Han Serif SC", "Songti SC", "SimSun", serif;
    }
    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      background:
        repeating-linear-gradient(0deg, rgba(62, 46, 31, .025) 0 1px, transparent 1px 34px),
        linear-gradient(180deg, #f8f1e7 0%, var(--bg) 54%, #e8ded0 100%);
      color: var(--ink);
      font-family: "Microsoft YaHei", "Noto Sans SC", "Segoe UI", sans-serif;
      line-height: 1.5;
      letter-spacing: 0;
    }
    button { font: inherit; color: inherit; }
    button:focus-visible {
      outline: 2px solid rgba(166, 116, 33, .75);
      outline-offset: 2px;
    }
    .app { display: grid; grid-template-columns: 324px minmax(0, 1fr); min-height: 100vh; }
    aside {
      position: sticky;
      top: 0;
      height: 100vh;
      overflow: auto;
      padding: 18px 12px 22px;
      background:
        linear-gradient(180deg, rgba(255, 245, 220, .045), transparent 140px),
        var(--sidebar);
      color: #f5ead8;
      border-right: 1px solid rgba(218, 203, 182, .28);
      box-shadow: 10px 0 28px rgba(25, 20, 15, .14);
      scrollbar-color: rgba(216, 186, 130, .58) rgba(255, 255, 255, .06);
      scrollbar-width: thin;
    }
    aside::-webkit-scrollbar { width: 10px; }
    aside::-webkit-scrollbar-track { background: rgba(255, 255, 255, .05); }
    aside::-webkit-scrollbar-thumb {
      background: rgba(216, 186, 130, .58);
      border: 3px solid var(--sidebar);
      border-radius: 999px;
    }
    .sidebar-title {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 10px;
      align-items: center;
      margin: 0 0 14px;
      padding-bottom: 13px;
      border-bottom: 1px solid rgba(234, 223, 206, .18);
    }
    h1 {
      margin: 0;
      font-family: var(--serif);
      font-size: 22px;
      line-height: 1.25;
      font-weight: 900;
    }
    .controls {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      align-items: center;
      gap: 10px;
      width: 100%;
      margin-bottom: 16px;
    }
    .controls button, .chapter-btn, .choice-btn, .entry-card {
      min-height: 38px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: var(--paper);
      cursor: pointer;
      transition: border-color .14s ease, background-color .14s ease, color .14s ease, transform .14s ease, box-shadow .14s ease;
    }
    .controls button:hover, .chapter-btn:hover, .choice-btn:hover, .entry-card:hover { border-color: var(--gold); color: var(--red); box-shadow: 0 8px 18px rgba(75, 49, 22, .08); }
    .controls button {
      padding: 8px 8px;
      color: #e9d7bb;
      background: rgba(255, 248, 234, .07);
      border-color: rgba(234, 223, 206, .2);
      font-size: 13px;
      line-height: 1.25;
    }
    #home, #reset, #locate-current, #values-panel { width: 100%; white-space: nowrap; }
    .controls button:hover {
      color: #fff5e4;
      background: rgba(166, 116, 33, .18);
      border-color: rgba(216, 186, 130, .52);
      box-shadow: none;
    }
    .feature-toggles {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
      width: 100%;
      margin: -4px 0 16px;
    }
    .feature-toggle {
      min-height: 44px;
      padding: 9px 10px;
      border: 1px solid rgba(234, 223, 206, .22);
      border-radius: 7px;
      background: rgba(255, 250, 242, .055);
      color: #e6d2b0;
      cursor: pointer;
      font-size: 13px;
      font-weight: 850;
      line-height: 1.25;
      transition: border-color .14s ease, background-color .14s ease, color .14s ease, box-shadow .14s ease;
    }
    .feature-toggle:hover {
      color: #fff8eb;
      border-color: rgba(216, 186, 130, .58);
      background: rgba(255, 250, 242, .095);
    }
    .feature-toggle.active {
      color: #25170e;
      border-color: rgba(216, 186, 130, .86);
      background:
        linear-gradient(180deg, rgba(255, 255, 255, .22), rgba(255, 255, 255, 0)),
        #f1dca8;
      box-shadow: inset 0 -3px 0 rgba(166, 116, 33, .36);
    }
    .chapter-group {
      margin: 16px 0 7px;
      padding-top: 10px;
      border-top: 1px solid rgba(234, 223, 206, .12);
      color: #dfbd76;
      font-size: 12px;
      font-weight: 900;
    }
    .chapter-btn {
      display: block;
      width: 100%;
      text-align: left;
      min-height: 0;
      padding: 8px 9px;
      margin-bottom: 6px;
      color: #f7eddf;
      background: rgba(255, 250, 242, .055);
      border-color: rgba(234, 223, 206, .16);
      box-shadow: none;
    }
    .chapter-btn:hover {
      color: #fff8eb;
      background: rgba(255, 250, 242, .095);
      border-color: rgba(216, 186, 130, .48);
      box-shadow: none;
    }
    .chapter-btn.active {
      border-color: rgba(216, 186, 130, .78);
      background: #f5ead6;
      color: var(--ink);
      box-shadow: inset 4px 0 0 var(--gold), 0 8px 18px rgba(0, 0, 0, .14);
    }
    .chapter-btn strong {
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      font-size: 12px;
      line-height: 1.35;
      font-weight: 850;
    }
    .chapter-btn span {
      display: block;
      margin-top: 4px;
      color: rgba(247, 237, 223, .62);
      font-size: 11px;
      line-height: 1.35;
    }
    .chapter-btn.active span { color: #6d6253; }
    main { min-width: 0; padding: 26px clamp(24px, 4vw, 56px) 56px; }
    .topbar {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: end;
      width: min(1320px, 100%);
      margin: 0 auto 20px;
      padding-bottom: 14px;
      border-bottom: 2px solid var(--ink-soft);
    }
    h2 { margin: 0; font-size: 32px; line-height: 1.12; font-weight: 900; }
    h2, h3, .entry-card strong { font-family: var(--serif); }
    .path-summary {
      display: flex;
      justify-content: flex-end;
      align-items: center;
      gap: 10px;
      color: var(--muted);
      font-size: 13px;
      text-align: right;
    }
    .path-summary button {
      min-height: 30px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: rgba(255, 250, 242, .82);
      color: var(--ink);
      padding: 5px 12px;
      cursor: pointer;
      font: inherit;
      font-weight: 800;
    }
    .path-summary button:hover {
      color: var(--red);
      border-color: var(--gold);
      background: #fff3dc;
    }
    #reader { display: grid; gap: 12px; width: min(1320px, 100%); margin: 0 auto; padding-bottom: 45vh; }
    .card {
      background:
        linear-gradient(180deg, rgba(255, 255, 255, .48), rgba(255, 255, 255, 0)),
        var(--panel);
      border: 1px solid var(--line);
      border-left: 5px solid var(--blue);
      border-radius: 7px;
      padding: 16px 18px 18px;
      box-shadow: 0 8px 20px rgba(50, 35, 18, .055);
    }
    .card.choice { border-left-color: var(--gold); }
    .card.interactive { border-left-color: var(--green); }
    .card.endpoint { border-left-color: var(--red); }
    .card.logic { border-left-color: var(--green); }
    .card.jump-target {
      box-shadow: 0 0 0 3px rgba(166, 116, 33, .28), 0 10px 24px rgba(50, 35, 18, .1);
    }
    .card-head {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 12px;
      align-items: start;
    }
    .eyebrow { color: var(--muted); font-size: 12px; font-weight: 900; }
    h3 { margin: 2px 0 0; font-size: 21px; line-height: 1.25; overflow-wrap: anywhere; }
    .pill {
      display: inline-flex;
      min-height: 26px;
      align-items: center;
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 3px 9px;
      color: var(--muted);
      background: var(--paper);
      font-size: 12px;
      white-space: nowrap;
    }
    .story-summary {
      max-width: none;
      margin: 10px 0 12px;
      color: #5e2521;
      font-size: 14px;
      font-weight: 650;
      line-height: 1.72;
      overflow-wrap: break-word;
      word-break: normal;
    }
    .story-summary[hidden] { display: none; }
    .prompt {
      width: 100%;
      margin: 12px 0 14px;
      font-size: 17px;
      line-height: 1.72;
      white-space: normal;
      overflow-wrap: break-word;
    }
    .options { display: grid; gap: 9px; margin-top: 12px; }
    .choice-btn {
      display: grid;
      grid-template-columns: 34px minmax(0, 1fr);
      gap: 10px;
      align-items: center;
      padding: 11px;
      text-align: left;
    }
    .choice-btn.picked {
      border-color: rgba(166, 116, 33, .72);
      background: #fff1c9;
      box-shadow: inset 4px 0 0 var(--gold);
    }
    .choice-btn:disabled {
      cursor: not-allowed;
      opacity: .58;
    }
    .choice-btn:disabled .letter { background: #82736c; }
    .choice-btn.interactive .choice-text { font-weight: 800; }
    .choice-btn.picked .letter { background: var(--gold); color: #1a120d; }
    .letter {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      display: inline-grid;
      place-items: center;
      background: var(--ink);
      color: #fff;
      font-weight: 800;
    }
    .choice-text { font-weight: 800; line-height: 1.45; }
    .effect-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      margin-top: 7px;
    }
    .effect-tag {
      display: inline-flex;
      align-items: center;
      min-height: 20px;
      padding: 2px 7px;
      border-radius: 999px;
      background: rgba(168, 35, 38, .08);
      border: 1px solid rgba(168, 35, 38, .22);
      color: var(--red);
      font-size: 12px;
      font-weight: 800;
    }
    .effect-tag[title],
    .condition-expression[title] {
      cursor: help;
    }
    .effect-tag.muted {
      background: rgba(106, 93, 76, .08);
      border-color: rgba(106, 93, 76, .22);
      color: var(--muted);
    }
    .video-effects {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
      margin: 10px 0 4px;
      padding: 8px 10px;
      border: 1px solid rgba(166, 117, 33, .24);
      border-radius: 7px;
      background: rgba(255, 245, 216, .52);
    }
    .video-effects strong {
      color: var(--muted);
      font-size: 12px;
      letter-spacing: .08em;
    }
    .continue-panel {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin: 14px 0 4px;
      padding: 12px 14px;
      border: 1px solid rgba(166, 117, 33, .36);
      border-radius: 8px;
      background: #fff5d8;
    }
    .continue-panel strong {
      display: block;
      color: var(--red);
      font-size: 13px;
      margin-bottom: 2px;
    }
    .continue-panel span {
      color: var(--ink);
      font-weight: 800;
    }
    .continue-btn {
      min-height: 36px;
      padding: 7px 18px;
      border: 1px solid rgba(166, 117, 33, .5);
      border-radius: 6px;
      background: #f7ead0;
      color: var(--ink);
      font-weight: 850;
      cursor: pointer;
    }
    .continue-btn:hover {
      border-color: var(--gold);
      color: var(--red);
      background: #fff0c6;
    }
    .condition-summary {
      display: grid;
      gap: 12px;
      margin-top: 12px;
      padding: 11px 12px;
      border: 1px solid rgba(166,117,32,.45);
      border-radius: 7px;
      background: #fff5d8;
    }
    .condition-summary strong { display: block; }
    .condition-summary span { color: var(--muted); font-size: 13px; }
    .condition-current {
      display: grid;
      gap: 6px;
      padding: 9px 10px;
      border: 1px solid rgba(166,117,32,.28);
      border-radius: 6px;
      background: rgba(255, 253, 248, .72);
    }
    .condition-current .result-line {
      color: var(--ink);
      font-weight: 800;
      font-size: 14px;
    }
    .condition-current .metric-line {
      color: var(--muted);
      font-size: 13px;
    }
    .condition-expression {
      font-family: Consolas, "Cascadia Mono", "Microsoft YaHei", monospace;
      font-size: 15px;
      font-weight: 800;
    }
    .condition-grid { display: grid; gap: 8px; }
    .condition-row {
      display: grid;
      grid-template-columns: 120px minmax(0, 1fr);
      gap: 10px;
      align-items: center;
      padding: 9px 10px;
      border: 1px solid rgba(166,117,32,.28);
      border-radius: 6px;
      background: rgba(255, 253, 248, .72);
      text-align: left;
    }
    .condition-row em {
      display: block;
      color: var(--muted);
      font-style: normal;
      font-size: 12px;
      margin-top: 2px;
    }
    .condition-block {
      display: grid;
      gap: 8px;
      padding-top: 2px;
    }
    .effect-row {
      display: grid;
      grid-template-columns: minmax(150px, 220px) minmax(0, 1fr) minmax(130px, 190px) auto;
      gap: 12px;
      align-items: center;
      padding: 8px 10px;
      border: 1px solid rgba(166,117,32,.22);
      border-radius: 6px;
      background: rgba(255, 253, 248, .72);
    }
    .choice-location {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.35;
      overflow-wrap: anywhere;
    }
    .choice-location small {
      display: block;
      margin-top: 2px;
      font-size: 12px;
      color: rgba(50,38,30,.68);
      font-family: Consolas, "Cascadia Mono", monospace;
    }
    .effect-row b {
      font-size: 14px;
      line-height: 1.45;
    }
    .choice-topic {
      display: block;
      color: var(--ink);
      font-weight: 900;
      overflow-wrap: anywhere;
    }
    .choice-question {
      display: block;
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
      overflow-wrap: anywhere;
    }
    .choice-related-options {
      display: block;
      margin-top: 3px;
      color: rgba(90, 65, 43, .82);
      font-size: 12px;
      font-weight: 700;
      overflow-wrap: anywhere;
    }
    .effect-row em {
      color: var(--muted);
      font-style: normal;
      font-size: 13px;
    }
    .reselect-btn {
      min-height: 34px;
      border: 1px solid rgba(166,117,32,.65);
      border-radius: 999px;
      background: linear-gradient(180deg, #fff8e3 0%, #f4dfad 100%);
      color: #4c2f12;
      padding: 7px 14px;
      cursor: pointer;
      white-space: nowrap;
      font-weight: 800;
      box-shadow: inset 0 1px 0 rgba(255,255,255,.85), 0 1px 3px rgba(50,38,30,.12);
    }
    .reselect-btn:hover {
      border-color: rgba(166,117,32,.9);
      background: linear-gradient(180deg, #fff3cb 0%, #e9c778 100%);
    }
    .home-panel {
      min-height: 0;
      display: grid;
      place-items: center;
      padding: clamp(56px, 11vh, 118px) 0 24px;
    }
    .values-home {
      align-items: start;
      padding-top: clamp(22px, 5vh, 54px);
    }
    .values-board {
      width: min(1280px, 100%);
    }
    .entry-grid {
      width: min(1060px, 100%);
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 16px;
    }
    .entry-card {
      position: relative;
      display: grid;
      align-content: center;
      gap: 8px;
      min-height: 128px;
      padding: 18px 18px 18px 22px;
      text-align: left;
      border-left: 6px solid var(--gold);
      background:
        linear-gradient(145deg, rgba(255, 255, 255, .76), rgba(255, 249, 238, .92)),
        var(--paper);
      box-shadow: 0 14px 28px rgba(50, 35, 18, .075);
      overflow: hidden;
    }
    .entry-card::after {
      content: "";
      position: absolute;
      inset: auto 14px 12px 22px;
      height: 1px;
      background: linear-gradient(90deg, rgba(166, 116, 33, .55), transparent);
    }
    .entry-card:hover { transform: translateY(-1px); }
    .entry-card strong { display: block; font-size: 23px; line-height: 1.18; }
    .entry-card span { color: var(--muted); font-size: 13px; line-height: 1.45; }
    .subtitles { margin: 14px 0 0; display: grid; gap: 3px; }
    .subtitle-row {
      display: grid;
      grid-template-columns: 44px 264px 104px minmax(0, 1fr);
      gap: 12px;
      align-items: baseline;
      line-height: 1.45;
      min-height: 30px;
      border-radius: 4px;
    }
    .subtitle-row:hover { background: rgba(166, 116, 33, .055); }
    .subtitle-row .idx { text-align: right; font-size: 18px; }
    .subtitle-row .time { color: var(--muted); font-family: Consolas, "Cascadia Mono", monospace; font-size: 13px; white-space: nowrap; }
    .subtitle-row .speaker { color: var(--red); font-size: 18px; font-weight: 800; white-space: nowrap; }
    .subtitle-row .text { font-size: 18px; overflow-wrap: anywhere; }
    .no-subtitle, .stop-note { margin-top: 10px; color: var(--muted); font-size: 13px; }
    .addons { margin-top: 34px; border-top: 2px solid var(--ink); padding-top: 18px; }
    .addons:empty { display: none; }
    .addon-card { background: var(--paper); border: 1px solid var(--line); border-radius: 8px; margin-bottom: 12px; padding: 14px; }
    .value-tabs { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 18px; }
    .value-tabs button { min-height: 38px; border: 1px solid var(--line); border-radius: 6px; background: var(--paper); color: var(--ink); padding: 8px 16px; cursor: pointer; font: inherit; }
    .value-tabs button.active, .value-tabs button:hover { color: var(--red); border-color: var(--gold); background: #fff3dc; }
    .value-status { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 12px; margin-bottom: 18px; }
    .value-status-card, .value-section, .minor-value-card {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255, 250, 242, .76);
    }
    .value-status-card { padding: 12px 14px; color: var(--muted); }
    .value-status-card strong { display: block; margin-bottom: 2px; color: var(--ink); font-size: 21px; }
    .value-section { margin: 18px 0; padding: 18px; }
    .value-section h3 { margin: 0 0 14px; font-size: 22px; }
    .main-value-chart {
      min-height: 330px;
      display: grid;
      grid-template-columns: repeat(5, minmax(96px, 1fr));
      gap: 18px;
      align-items: end;
      padding: 18px 8px 4px;
      border-radius: 8px;
      background:
        linear-gradient(180deg, rgba(166, 116, 33, .12) 0 1px, transparent 1px 25%),
        linear-gradient(180deg, transparent 0 74%, rgba(166, 116, 33, .1) 74% 75%, transparent 75%);
    }
    .main-value-column { min-width: 0; height: 286px; display: grid; grid-template-rows: 28px 1fr 42px; gap: 8px; text-align: center; }
    .main-value-number { color: var(--red); font-weight: 900; font-size: 22px; line-height: 1; font-variant-numeric: tabular-nums; }
    .main-value-track { position: relative; overflow: hidden; border-radius: 8px 8px 4px 4px; background: #efe2d0; border: 1px solid #dfcdb5; box-shadow: inset 0 0 0 1px rgba(255,255,255,.4); }
    .main-value-bar { position: absolute; left: 0; right: 0; bottom: 0; height: var(--h); min-height: 2px; background: linear-gradient(180deg, #b43933, #a67421 54%, #2f6f73); }
    .main-value-name { font-weight: 900; font-size: 18px; }
    .main-value-scale { color: var(--muted); font-size: 12px; }
    .minor-value-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(230px, 1fr)); gap: 12px; }
    .minor-value-card { padding: 13px 14px; }
    .minor-value-head { display: flex; justify-content: space-between; gap: 10px; align-items: baseline; margin-bottom: 8px; font-weight: 800; }
    .minor-value-number { color: var(--red); font-size: 18px; font-weight: 900; font-variant-numeric: tabular-nums; }
    .signed-track { position: relative; height: 12px; overflow: hidden; border-radius: 999px; background: #efe2d0; border: 1px solid #dfcdb5; }
    .signed-track::after { content: ""; position: absolute; top: 0; bottom: 0; left: 50%; border-left: 1px solid rgba(25, 20, 15, .28); }
    .signed-bar { position: absolute; top: 0; bottom: 0; width: var(--w); min-width: 2px; background: #2f6f73; }
    .signed-bar.pos { left: 50%; border-radius: 0 999px 999px 0; }
    .signed-bar.neg { right: 50%; border-radius: 999px 0 0 999px; background: #a13b33; }
    .value-empty { padding: 18px; border: 1px dashed var(--line); border-radius: 8px; color: var(--muted); background: rgba(255, 253, 248, .55); }
    .minor-value-card details {
      border-color: rgba(218, 203, 182, .86);
      background: rgba(255, 250, 242, .72);
      box-shadow: none;
    }
    .minor-value-card summary {
      padding: 8px 10px;
      color: var(--ink);
    }
    .value-source-list { margin-top: 0; display: grid; gap: 0; }
    .value-source-row {
      display: grid;

  <script>
    const IS_TOOLS_TEMPLATE_PAGE = /\/tools\/storyline_graph_template\.html$/i.test(location.pathname.replace(/\\/g, '/'));
    const GRAPH_ASSET_BASE_URL = IS_TOOLS_TEMPLATE_PAGE ? '../data/game/storyline_graph/' : '';

    async function fetchTextFile(url) {
      const response = await fetch(url, { cache: 'no-store' });
      if (!response.ok) throw new Error(`无法加载 ${url}：${response.status}`);
      return response.text();
    }
    async function fetchJsonFile(url) {
      const response = await fetch(url, { cache: 'no-store' });
      if (!response.ok) throw new Error(`无法加载 ${url}：${response.status}`);
      return response.json();
    }
    function parseJsonl(text, url) {
      return String(text || '').split(/\r?\n/)
        .map((line, index) => ({ line: line.trim(), index }))
        .filter(item => item.line)
        .map(item => {
          try {
            return JSON.parse(item.line);
          } catch (error) {
            throw new Error(`${url} 第 ${item.index + 1} 行不是合法 JSON：${error.message}`);
          }
        });
    }
    function normalizeCondition(row) {
      const storylineId = row.storyline_id || '';
      const nodeHash = row.node_hash || '';
      const upstream = Array.isArray(row.upstream_choices) ? row.upstream_choices : [];
      const choiceIndexCases = Array.isArray(row.choice_index_cases) ? row.choice_index_cases : [];
      return {
        ...row,
        storylineId,
        nodeHash,
        nodeKind: row.node_kind,
        nodeId: storylineId && nodeHash ? `${storylineId}:${nodeHash}` : '',
        variableDisplayNames: row.variable_display_names || {},
        upstream_choices: upstream.map(item => {
          const choiceHash = item.choice_hash || '';
          return {
            ...item,
            storylineId: item.storyline_id || storylineId,
            storyline_id: item.storyline_id || storylineId,
            choice_node_id: storylineId && choiceHash ? `${storylineId}:${choiceHash}` : '',
          };
        }),
        choiceIndexCases: choiceIndexCases.map(item => {
          const match = upstream.find(source =>
            source.choice_video_key === item.choice_video_key &&
            Number(source.choice_index) === Number(item.choice_index)
          ) || {};
          const choiceHash = item.choice_hash || match.choice_hash || '';
          const targetNodeId = item.target_node_id || (storylineId && item.target_hash ? `${storylineId}:${item.target_hash}` : '');
          return {
            ...item,
            storylineId: item.storyline_id || storylineId,
            storyline_id: item.storyline_id || storylineId,
            choice_node_id: storylineId && choiceHash ? `${storylineId}:${choiceHash}` : '',
            choiceNodeId: storylineId && choiceHash ? `${storylineId}:${choiceHash}` : '',
            choiceVideoKey: item.choice_video_key,
            choiceTitle: item.choice_title || match.choice_title || '',
            choiceIndex: Number(item.choice_index),
            choiceText: item.choice_text || match.choice_text || '',
            conditionGroupIndex: Number.isFinite(Number(item.condition_group_index)) ? Number(item.condition_group_index) : null,
            targetLabel: item.target || item.target_video_key || '',
            targetNodeId,
            target_node_id: targetNodeId,
          };
        }),
        outcomeTargetIds: row.outcome_target_ids || {},
      };
    }
    function normalizeEffectChoiceSource(item, fallbackStorylineId = '') {
      const storylineId = item?.storyline_id || item?.storylineId || fallbackStorylineId || '';
      const choiceHash = item?.choice_hash || item?.choiceHash || '';
      const rawIndex = item?.choice_index ?? item?.choiceIndex;
      const choiceIndex = Number(rawIndex);
      const choiceNodeId = item?.choice_node_id || item?.choiceNodeId || (storylineId && choiceHash ? `${storylineId}:${choiceHash}` : '');
      const choiceVideoKey = item?.choice_video_key || item?.choiceVideoKey || '';
      const choiceTitle = item?.choice_title || item?.choiceTitle || '';
      const choiceText = item?.choice_text || item?.choiceText || '';
      return {
        ...item,
        storylineId,
        storyline_id: storylineId,
        choiceHash,
        choice_hash: choiceHash,
        choiceNodeId,
        choice_node_id: choiceNodeId,
        choiceVideoKey,
        choice_video_key: choiceVideoKey,
        choiceTitle,
        choice_title: choiceTitle,
        choiceIndex: Number.isFinite(choiceIndex) ? choiceIndex : rawIndex,
        choice_index: Number.isFinite(choiceIndex) ? choiceIndex : rawIndex,
        choiceText,
        choice_text: choiceText,
      };
    }
    function sourceChoiceIndex(source) {
      const value = source?.choiceIndex ?? source?.choice_index;
      const number = Number(value);
      return Number.isFinite(number) ? number : value;
    }
    function sourceChoiceHash(source) {
      return source?.choiceHash || source?.choice_hash || '';
    }
    function sourceChoiceVideoKey(source) {
      return source?.choiceVideoKey || source?.choice_video_key || '';
    }
    function normalizeVideoEffect(row) {
      const storylineId = row.storyline_id || '';
      return {
        storylineId,
        videoHash: row.video_hash,
        videoKey: row.video_key,
        effectKind: row.effect_kind,
        effectKey: row.effect_key,
        effectName: row.effect_name,
        effectDisplayName: row.effect_display_name,
        effectValue: row.effect_value,
        upstreamChoices: Array.isArray(row.upstream_choices)
          ? row.upstream_choices.map(item => normalizeEffectChoiceSource(item, storylineId))
          : [],
      };
    }
    function normalizeGlobalVariable(row) {
      const storylineId = row.storyline_id || '';
      const nodeHash = row.node_hash || '';
      const upstream = Array.isArray(row.upstream_choices) ? row.upstream_choices : [];
      return {
        ...row,
        storylineId,
        nodeHash,
        nodeId: storylineId && nodeHash ? `${storylineId}:${nodeHash}` : '',
        kind: row.kind || '',
        variableHash: row.variable_hash || '',
        variableName: row.variable_name || '',
        value: row.value,
        upstreamChoices: upstream.map(item => {
          const choiceHash = item.choice_hash || '';
          return {
            ...item,
            storylineId: item.storyline_id || storylineId,
            storyline_id: item.storyline_id || storylineId,
            choice_node_id: storylineId && choiceHash ? `${storylineId}:${choiceHash}` : '',
          };
        }),
      };
    }
    function deriveOptionEffects(videoEffects) {
      const rows = [];
      for (const effect of videoEffects || []) {
        const directChoices = (effect.upstreamChoices || []).filter(choice => choice.distance === 1);
        for (const choice of directChoices) {
          const choiceHash = choice.choice_hash || '';
          rows.push({
            storylineId: effect.storylineId,
            choiceHash,
            choiceNodeId: effect.storylineId && choiceHash ? `${effect.storylineId}:${choiceHash}` : '',
            choiceVideoKey: choice.choice_video_key,
            choiceTitle: choice.choice_title,
            choiceIndex: choice.choice_index,
            choiceText: choice.choice_text,
            resultVideoKey: effect.videoKey,
            effectKind: effect.effectKind,
            effectKey: effect.effectKey,
            effectName: effect.effectName,
            effectDisplayName: effect.effectDisplayName,
            effectValue: effect.effectValue,
          });
        }
      }
      return rows;
    }
    function nativeFlavorDisplayName(effect) {
      const key = String(effect?.effectKey || '').trim();
      const name = String(effect?.effectName || '').trim();
      return isFlavorToastEffect(effect) && key && name ? `${key}${name}` : '';
    }
    function effectEventSignature(effect) {
      const value = Number(effect?.effectValue);
      return [
        effect?.storylineId || '',
        effect?.videoKey || '',
        Number.isFinite(value) ? value : String(effect?.effectValue ?? ''),
      ].join('|');
    }
    function buildEffectDisplayNames(conditionRows, videoEffects) {
      const map = new Map();
      const add = (key, value, overwrite = false) => {
        if (!key || !value) return;
        const safeKey = String(key);
        if (!overwrite && map.has(safeKey)) return;
        map.set(safeKey, String(value));
      };
      const flavorByEvent = new Map();
      for (const effect of videoEffects || []) {
        const nativeName = nativeFlavorDisplayName(effect);
        if (!nativeName) continue;
        add(nativeName, nativeName, true);
        const eventKey = effectEventSignature(effect);
        if (!flavorByEvent.has(eventKey)) flavorByEvent.set(eventKey, []);
        flavorByEvent.get(eventKey).push(nativeName);
      }
      for (const effect of videoEffects || []) {
        if (isFlavorToastEffect(effect)) continue;
        const eventFlavors = flavorByEvent.get(effectEventSignature(effect)) || [];
        const knownName = String(effect.effectDisplayName || effect.effectName || '').trim();
        const nativeName = eventFlavors.find(name => name === knownName) ||
          (eventFlavors.length === 1 ? eventFlavors[0] : '');
        if (nativeName && isAsciiVariableKey(effect.effectKey)) {
          add(effect.effectKey, nativeName, true);
          if (effect.effectName && !isAsciiVariableKey(effect.effectName)) add(effect.effectName, nativeName, true);
          continue;
        }
        add(effect.effectKey, effect.effectDisplayName);
        add(effect.effectName, effect.effectDisplayName);
      }
      for (const condition of conditionRows || []) {
        const names = condition.variableDisplayNames || {};
        for (const [key, value] of Object.entries(names)) add(key, value);
      }
      return map;
    }
    function displayNameForVariable(key) {
      if (!key) return '';
      return mechanics.effectDisplayNames.get(String(key)) || '';
    }
    const DIMENSION_DISPLAY_NAMES = new Map([
      ['dimension:0', '韧性'],
      ['dimension:1', '谋略'],
      ['dimension:2', '野心'],
      ['dimension:3', '果决'],
      ['dimension:4', '声望'],
    ]);
    function dimensionDisplayName(key) {
      return DIMENSION_DISPLAY_NAMES.get(String(key || '').trim()) || '';
    }
    function isAsciiVariableKey(key) {
      return /^[A-Za-z_][A-Za-z0-9_]*$/.test(String(key || ''));
    }
    function containsCjk(text) {
      return /[\u3400-\u9fff]/.test(String(text || ''));
    }
    function isOpaqueVariableKey(key) {
      const value = String(key || '').trim();
      return Boolean(value && /^[A-Za-z0-9_]+$/.test(value) && /\d/.test(value) && !containsCjk(value));
    }
    function displayNameWithKeyFallback(key, display) {
      const rawKey = String(key || '').trim();
      const rawDisplay = String(display || '').trim();
      if (!rawKey) return rawDisplay;
      if (!rawDisplay || rawDisplay === rawKey) return rawKey;
      return isOpaqueVariableKey(rawKey) ? `${rawKey}（${rawDisplay}）` : rawDisplay;
    }
    function explainedDisplayNameForVariable(key, fallback = '') {
      return displayNameWithKeyFallback(key, displayNameForVariable(key) || fallback);
    }
    function effectConceptName(effect) {
      const key = String(effect.effectKey || '').trim();
      const name = String(effect.effectName || '').trim();
      const dimensionName = dimensionDisplayName(key) || dimensionDisplayName(name);
      if (dimensionName) return dimensionName;
      if (isFlavorToastEffect(effect) && key && name) {
        return `${key}${name}`;
      }
      const display = String(effect.effectDisplayName || displayNameForVariable(key) || displayNameForVariable(name) || '').trim();
      return display || name || key;
    }
    function canonicalEffectName(effect) {
      const key = String(effect.effectKey || '').trim();
      const name = String(effect.effectName || '').trim();
      const dimensionName = dimensionDisplayName(key) || dimensionDisplayName(name);
      if (dimensionName) return dimensionName;
      if (isFlavorToastEffect(effect) && key && name) return `${key}${name}`;
      return effectConceptName(effect) || effectVisibleName(effect) || '未命名数值';
    }
    function effectIdentityName(effect) {
      const key = String(effect.effectKey || '').trim();
      const name = String(effect.effectName || '').trim();
      const dimensionName = dimensionDisplayName(key) || dimensionDisplayName(name);
      if (dimensionName) return dimensionName;
      if (isFlavorToastEffect(effect) && key && name) return `${key}${name}`;
      if (isOpaqueVariableKey(key)) return key || name || String(effect.effectDisplayName || '').trim() || '未命名数值';
      if (name && containsCjk(name) && name !== key) return name;
      const display = String(effect.effectDisplayName || displayNameForVariable(key) || displayNameForVariable(name) || '').trim();
      if (display && containsCjk(display) && display !== key && display !== name && !isOpaqueVariableKey(key)) return display;
      if (display && display !== key && display !== name) return display;
      return key || name || String(effect.effectDisplayName || '').trim() || '未命名数值';
    }
    function isFlavorToastEffect(effect) {
      return effect.effectKind === 'PlayVideo_Toast_FlavorIncrese' || effect.effectKind === 'PlayVideo_Toast_FlavorDecrease';
    }
    function effectVisibleName(effect) {
      const key = String(effect.effectKey || '').trim();
      const name = String(effect.effectName || '').trim();
      const dimensionName = dimensionDisplayName(key) || dimensionDisplayName(name);
      if (dimensionName) return dimensionName;
      if (isFlavorToastEffect(effect) && key && name) return `${key}${name}`;
      if (isAsciiVariableKey(key)) return displayNameForVariable(key) || effect.effectDisplayName || displayNameForVariable(name) || name || '未命名数值';
      if (isOpaqueVariableKey(key)) return valuePanelLabelForEffect(effect);
      return name || key || '效果';
    }
    function valuePanelLabelForEffect(effect) {
      const identity = effectIdentityName(effect);
      const display = canonicalEffectName(effect);
      return displayNameWithKeyFallback(identity, display);
    }
    function effectDedupeKey(effect) {
      return [
        effect.storylineId || '',
        effect.videoKey || '',
        effectIdentityName(effect),
        String(effect.effectValue ?? ''),
      ].join('|');
    }
    function effectPriority(effect) {
      if (effect.effectKind === 'ShowChoice_SixDimension_Increase') return 0;
      if (effect.effectKind === 'PlayVideo_VideoKey_Variable_Int') return 1;
      if (isFlavorToastEffect(effect)) return 2;
      if (effect.effectKind === 'PlayVideo_Toast_DimensionIncrease') return 3;
      if (isAsciiVariableKey(effect.effectKey)) return 3;
      return 4;
    }
    function isNoopIncreaseEffect(effect) {
      return String(effect?.effectKind || '').includes('Increase') && Number(effect?.effectValue) === 0;
    }
    function dedupeEffects(effects) {
      const order = [];
      const byKey = new Map();
      for (const effect of effects || []) {
        const key = effectDedupeKey(effect);
        const existing = byKey.get(key);
        if (!existing) {
          byKey.set(key, effect);
          order.push(key);
          continue;
        }
        if (effectPriority(effect) < effectPriority(existing)) {
          byKey.set(key, effect);
        }
      }
      return order.map(key => byKey.get(key)).filter(Boolean);
    }
    function effectStatKeys(effect) {
      const keys = new Set();
      const add = key => {
        const value = String(key || '').trim();
        if (value) keys.add(value);
      };
      const key = String(effect.effectKey || '').trim();
      const name = String(effect.effectName || '').trim();
      add(dimensionDisplayName(key));
      add(dimensionDisplayName(name));
      if (isFlavorToastEffect(effect) && key && name) {
        add(`${key}${name}`);
        add(effect.effectDisplayName);
        return keys;
      }
      add(key);
      if (name !== key) add(name);
      add(effect.effectDisplayName);
      add(displayNameForVariable(key));
      add(displayNameForVariable(name));
      add(effectConceptName(effect));
      add(effectVisibleName(effect));
      return keys;
    }
    function addChoiceSource(videoKey, source) {
      if (!videoKey) return;
      if (!choiceSourcesByResultVideoKey.has(videoKey)) choiceSourcesByResultVideoKey.set(videoKey, []);
      choiceSourcesByResultVideoKey.get(videoKey).push(source);
    }
    function addChoiceSourceByChoiceVideoKey(videoKey, source) {
      if (!videoKey) return;
      if (!choiceSourcesByChoiceVideoKey.has(videoKey)) choiceSourcesByChoiceVideoKey.set(videoKey, []);
      choiceSourcesByChoiceVideoKey.get(videoKey).push(source);
    }
    function buildChoiceSourcesByResultVideoKey() {
      choiceSourcesByResultVideoKey = new Map();
      choiceSourcesByChoiceVideoKey = new Map();
      choiceNodeIdsByVideoKey = new Map();
      choiceNodeIdsByScopedVideoKey = new Map();
      for (const chapter of chapters) {
        for (const node of chapter.nodes || []) {
          if (node.kind !== 'ShowChoice') continue;
          if (node.videoKey) {
            if (!choiceNodeIdsByVideoKey.has(node.videoKey)) choiceNodeIdsByVideoKey.set(node.videoKey, []);
            choiceNodeIdsByVideoKey.get(node.videoKey).push(node.id);
            const scopedKey = scopedVideoKey(node.storylineId, node.videoKey);
            if (!choiceNodeIdsByScopedVideoKey.has(scopedKey)) choiceNodeIdsByScopedVideoKey.set(scopedKey, []);
            choiceNodeIdsByScopedVideoKey.get(scopedKey).push(node.id);
            addChoiceSourceByChoiceVideoKey(node.videoKey, {
              storylineId: node.storylineId,
              choiceNodeId: node.id,

      if (nodeChapter?.chapter === 'chapter999') {

        if (text.includes('新世界线')) return firstEpisodeTarget('new_world');
        return null;
      }
      return nextEpisodeOrChapterTarget(nodeChapter, nodeStartId);
    }
    function renderContinuation(node) {
      const target = continuationTargetForNode(node);
      if (!target?.chapterId || !target.startId) return '';
      return `<div class="continue-panel">
        <div>
          <strong>下一段</strong>
          <span>${escapeHtml(target.label)}</span>
        </div>
        <button class="continue-btn" data-continue-chapter="${escapeHtml(target.chapterId)}" data-continue-nav-key="${escapeHtml(target.navKey)}" data-continue-start-id="${escapeHtml(target.startId)}">继续</button>
      </div>`;
    }
    function safeSummaryFilename(videoKey) {
      return String(videoKey || '').trim().replace(/[^A-Za-z0-9_.-]+/g, '_') + '.summary.md';
    }
    function summaryDocUrl(videoKey) {
      return VIDEO_SUMMARY_DOC_BASE_URL + encodeURIComponent(safeSummaryFilename(videoKey));
    }
    function extractDisplaySummaryFromMarkdown(text) {
      const lines = String(text || '').split(/\r?\n/);
      const collected = [];
      let capturing = false;
      for (const line of lines) {
        if (/^###\s+display_summary\s*$/i.test(line.trim())) {
          capturing = true;
          continue;
        }
        if (!capturing) continue;
        if (/^#{1,6}\s+/.test(line.trim())) break;
        if (!collected.length && !line.trim()) continue;
        collected.push(line);
      }
      return collected.join('\n').replace(/\s*\n+\s*/g, ' ').trim();
    }
    function loadStorySummary(videoKey) {
      const key = String(videoKey || '').trim();
      if (!key) return Promise.resolve('');
      if (videoSummaryPromisesByKey.has(key)) return videoSummaryPromisesByKey.get(key);
      const promise = fetchTextFile(summaryDocUrl(key))
        .then(text => extractDisplaySummaryFromMarkdown(text))
        .then(summary => {
          videoSummaryPromisesByKey.delete(key);
          return summary || '';
        })
        .catch(error => {
          console.warn(`无法加载剧情摘要 ${key}`, error);
          videoSummaryPromisesByKey.delete(key);
          return '';
        });
      videoSummaryPromisesByKey.set(key, promise);
      return promise;
    }
    function renderStorySummary(node) {
      if (!showStorySummaries || !node?.videoKey || node.kind === 'ShowChoice') return '';
      const videoKey = String(node.videoKey).trim();
      return `<div class="story-summary" data-overlay-field="story-summary" data-summary-video-key="${escapeHtml(videoKey)}" hidden></div>`;
    }
    function renderCard(node, active) {
      const kind = escapeHtml(kindLabel(node));
      const title = escapeHtml(titleOf(node));
      const sub = [node.title, node.storylineTitle].filter(Boolean).filter((v, i, arr) => arr.indexOf(v) === i).join(' / ');
      const prompt = node.kind === 'ShowChoice' ? (node.title || node.annotation || '') : (isConditionNode(node) ? '' : (node.annotation || ''));
      const pillValue = isLogicNode(node) ? '' : (node.videoKey || node.endpointId || '');
      const pill = pillValue ? `<span class="pill">${escapeHtml(pillValue)}</span>` : '';
      const decision = isBranchNode(node) ? renderDecision(node, active) : '';
      const condition = isConditionNode(node) ? renderCondition(node) : '';
      const subtitles = node.videoKey && node.kind !== 'ShowChoice' ? renderSubtitles(node) : '';
      const videoEffects = node.videoKey && node.kind !== 'ShowChoice' ? renderVideoEffects(node) : '';
      const continuation = renderContinuation(node);
      const storySummary = renderStorySummary(node);
      return `<article class="${cardClass(node)}" data-card-node="${escapeHtml(node.id)}" data-video-key="${escapeHtml(node.videoKey || '')}">
        <div class="card-head">
          <div>
            <div class="eyebrow">${escapeHtml(node.chapter || currentChapter?.chapter || '')} · ${kind}</div>
            <h3>${title}</h3>
            ${sub ? `<div class="stop-note">${escapeHtml(sub)}</div>` : ''}
          </div>
          ${pill}
        </div>
        ${storySummary}
        ${prompt ? `<div class="prompt" data-overlay-field="prompt">${escapeHtml(prompt)}</div>` : ''}
        ${decision}
        ${condition}
        ${continuation}
        ${videoEffects}
        ${subtitles}
      </article>`;
    }
    function drawChapters() {
      const activeNavKey = effectiveNavKey();
      const groups = [
        ['empress', '女帝线'],
        ['new_world', '新世界线'],
      ];
      const prelude = chapterById.get('chapter999');
      const preludeHtml = prelude ? `
        <div class="chapter-group">前情提要</div>
        <button class="chapter-btn ${activeNavKey === 'prelude' ? 'active' : ''}" data-prelude="1">
          <strong>主线分歧前情</strong>
          <span>${prelude.chapter} · ${prelude.choiceEdgeCount} 选择边</span>
        </button>
      ` : '';
      const lineHtml = groups.map(([key, label]) => {
        const list = chapters.filter(ch => ch.lineKey === key);
        if (!list.length) return '';
        return `<div class="chapter-group">${label}</div>` + list.map(ch => {
          const episodeList = ch.episodes?.length ? ch.episodes : [{ label: ch.title, episode: ch.title, suffix: '' }];
          return episodeList.map((episode, index) => {
            const navKey = `episode:${ch.chapter}:${index}`;
            return `<button class="chapter-btn ${activeNavKey === navKey ? 'active' : ''}" data-chapter="${escapeHtml(ch.chapter)}" data-nav-key="${escapeHtml(navKey)}" data-start-id="${escapeHtml(episode.startId || ch.entryId)}">
              <strong>${escapeHtml(episode.label)}</strong>
              <span>${escapeHtml(ch.chapter)} · ${ch.nodeCount} 节点 · ${ch.choiceEdgeCount} 选择边</span>
            </button>`;
          }).join('');
        }).join('');
      }).join('');
      const addonHtml = data.addons.length ? `
        <div class="chapter-group">额外内容</div>
        ${data.addons.map(addon => `<button class="chapter-btn ${activeNavKey === `addon:${addon.package}` ? 'active' : ''}" data-addon="${escapeHtml(addon.package)}">
          <strong>${escapeHtml(addon.title)}</strong>
          <span>${addon.files.length} 个片段</span>
        </button>`).join('')}
      ` : '';
      els.chapters.innerHTML = preludeHtml + lineHtml + addonHtml;
      scrollActiveNavIntoView(activeNavKey);
    }
    function renderHome() {
      els.lineTitle.textContent = '入口';
      els.chapterTitle.textContent = '选择入口';
      els.pathSummary.textContent = '';
      els.addons.innerHTML = '';
      els.addons.hidden = true;
      els.reader.innerHTML = `<section class="home-panel">
        <div class="entry-grid">
          <button class="entry-card" data-entry-main="1"><strong>主线</strong><span>从分歧前的前情提要和选择开始。</span></button>
          <button class="entry-card" data-entry-extra="1"><strong>额外内容</strong><span>查看登基后的额外内容。</span></button>
          <button class="entry-card" data-entry-values="1"><strong>数值</strong><span>查看当前记录累计的数值。</span></button>
        </div>
      </section>`;
      refreshHistoricalNameOverlay();
    }
    function renderAddonList() {
      els.lineTitle.textContent = '额外内容';
      els.chapterTitle.textContent = '选择额外内容';
      els.pathSummary.textContent = `${data.addons.length} 个事件`;
      els.addons.innerHTML = '';
      els.addons.hidden = true;
      els.reader.innerHTML = `<section class="home-panel">
        <div class="entry-grid">
          ${data.addons.map(addon => `<button class="entry-card" data-addon="${escapeHtml(addon.package)}"><strong>${escapeHtml(addon.title)}</strong><span>${addon.files.length} 个片段</span></button>`).join('')}
        </div>
      </section>`;
      refreshHistoricalNameOverlay();
    }
    function renderAddonDetail() {
      const addon = currentAddon;
      els.lineTitle.textContent = '额外内容';
      els.chapterTitle.textContent = addon ? addon.title : '额外内容';
      els.pathSummary.textContent = addon ? `${addon.files.length} 个片段` : '';
      els.addons.innerHTML = '';
      els.addons.hidden = true;
      if (!addon) {
        renderAddonList();
        return;
      }
      els.reader.innerHTML = addon.files.map((file, index) => `
        <article class="card">
          <div class="card-head">
            <div>
              <div class="eyebrow">额外内容 · 片段 ${index + 1}</div>
              <h3>${escapeHtml(addon.title)}</h3>
            </div>
          </div>
          ${renderSrtBlock(file, `addon:${addon.package}:${index}`)}
        </article>
      `).join('');
      hydrateSubtitles(els.reader);
      refreshHistoricalNameOverlay();
    }
    function renderValuesView() {
      syncRouteStateFromStorage();
      const lineNames = [...new Set(['女帝线', '新世界线'])]
        .sort((a, b) => valueLineRank(a) - valueLineRank(b) || a.localeCompare(b, 'zh-Hans-CN'));
      activeValueLine = lineNames.includes(activeValueLine) ? activeValueLine : lineNames[0] || '女帝线';
      const result = calculateValueLines(activeValueLine);
      const values = [...(result.lines.get(activeValueLine) || new Map()).values()];
      const hasMainStats = lineDefinesMainValues(activeValueLine);
      const main = MAIN_VALUE_STATS.map(name => values.find(item => item.label === name) || { label: name, total: 0, group: 'main', sources: [] });
      const relation = values.filter(item => item.group === 'relation').sort((a, b) => a.label.localeCompare(b.label, 'zh-Hans-CN'));
      const plot = values.filter(item => item.group === 'plot').sort((a, b) => a.label.localeCompare(b.label, 'zh-Hans-CN'));
      const mainSection = hasMainStats ? `<section class="value-section"><h3>主数值</h3>${renderMainValueChart(main)}</section>` : '';
      els.lineTitle.textContent = '数值';
      els.chapterTitle.textContent = '数值面板';
      els.pathSummary.innerHTML = '<span>按当前路线计算</span><button type="button" data-refresh-values>刷新</button>';
      els.addons.innerHTML = '';
      els.addons.hidden = true;
      els.reader.innerHTML = `
        <div class="value-tabs">
          ${lineNames.map(line => `<button class="${line === activeValueLine ? 'active' : ''}" data-value-line="${escapeHtml(line)}">${escapeHtml(line)}</button>`).join('')}
        </div>
        <div class="value-status">
          <div class="value-status-card"><strong>${result.selectionsForValues.length}</strong>路线选择</div>
          <div class="value-status-card"><strong>${result.progressIds.size}</strong>路线节点</div>
          <div class="value-status-card"><strong>${result.played.size}</strong>剧情段</div>
        </div>
        ${mainSection}
        <section class="value-section"><h3>人物/关系</h3>${renderMinorValueCards(relation)}</section>
        <section class="value-section"><h3>路线影响</h3>${renderMinorValueCards(plot)}</section>
      `;
      els.reader.querySelectorAll('[data-value-line]').forEach(button => {
        button.addEventListener('click', () => {
          activeValueLine = button.dataset.valueLine;
          renderValuesView();
        });
      });
      refreshHistoricalNameOverlay();
    }
    function goToRouteChoice(nodeId) {
      const target = nodesById.get(nodeId);
      if (!target) return;
      const chapter = chapterForNode(nodeId);
      if (!chapter) return;
      goToChoice(nodeId);
    }
    function draw() {
      drawChapters();
      if (mode === 'home') {
        renderHome();
        return;
      }
      if (mode === 'addons') {
        renderAddonList();
        return;
      }
      if (mode === 'addon') {
        renderAddonDetail();
        return;
      }
      if (mode === 'values') {
        renderValuesView();
        return;
      }
      const activeNode = nodesById.get(path[path.length - 1]);
      els.lineTitle.textContent = activeNode?.lineTitle || currentChapter?.lineTitle || '';
      els.chapterTitle.textContent = activeNode?.chapterTitle || currentChapter?.title || '';
      els.pathSummary.textContent = `${path.length} 个节点 · ${selected.length} 次选择`;
      const lastId = path[path.length - 1];
      els.addons.innerHTML = '';
      els.addons.hidden = true;
      els.reader.innerHTML = path.map(id => nodesById.get(id)).filter(shouldRenderNode).map(node => renderCard(node, node.id === lastId)).join('');
      els.reader.querySelectorAll('.choice-btn').forEach(btn => {
        btn.addEventListener('click', event => {
          event.preventDefault();
          event.stopPropagation();
          choose(btn.dataset.node, Number(btn.dataset.edge));
        });
      });
      hydrateStorySummaries(els.reader);
      hydrateSubtitles(els.reader);
      refreshHistoricalNameOverlay();
    }
    function continueToChapter(chapterId, navKey, startId) {
      const chapter = chapterById.get(chapterId);
      if (!chapter) return;
      startChapter(chapter, navKey || null, startId || null, { preserveCurrentRoute: true });
      saveState({ accumulateHistory: true });
      requestAnimationFrame(() => window.scrollTo({ top: 0, behavior: 'smooth' }));
    }
    function hydrateStorySummaries(root) {
      if (!showStorySummaries) return;
      root.querySelectorAll('[data-summary-video-key]').forEach(element => {
        const videoKey = element.dataset.summaryVideoKey || '';
        loadStorySummary(videoKey).then(summary => {
          if (!showStorySummaries) return;
          if (!summary || element.dataset.summaryVideoKey !== videoKey || !document.body.contains(element)) return;
          element.textContent = summary;
          element.hidden = false;
          refreshHistoricalNameOverlay(element);
        });
      });
    }
    function syncFeatureToggles() {
      els.storySummaryToggle.classList.toggle('active', showStorySummaries);
      els.storySummaryToggle.setAttribute('aria-pressed', showStorySummaries ? 'true' : 'false');
      els.historicalNamesToggle.classList.toggle('active', showHistoricalNames);
      els.historicalNamesToggle.setAttribute('aria-pressed', showHistoricalNames ? 'true' : 'false');
    }
    els.home.addEventListener('click', showHome);
    els.reset.addEventListener('click', resetAllChoices);
    els.locateCurrent.addEventListener('click', locateCurrent);
    els.valuesPanel.addEventListener('click', showValues);
    els.storySummaryToggle.addEventListener('click', () => {
      showStorySummaries = !showStorySummaries;
      saveFeatureToggles();
      syncFeatureToggles();
      if (data) draw();
    });
    els.historicalNamesToggle.addEventListener('click', () => {
      showHistoricalNames = !showHistoricalNames;
      saveFeatureToggles();
      syncFeatureToggles();
      if (data) draw();
      else refreshHistoricalNameOverlay();
    });
    els.pathSummary.addEventListener('click', event => {
      if (!event.target.closest('[data-refresh-values]')) return;
      syncRouteStateFromStorage({ force: true });
      renderValuesView();
    });
    window.addEventListener('storage', event => {
      if (event.key !== STORAGE_KEY) return;
      lastAppliedStorageValue = '';
      if (mode === 'values') renderValuesView();
    });
    els.chapters.addEventListener('click', event => {
      const button = event.target.closest('button');
      if (!button) return;
      if (button.dataset.prelude) startMain();
      else if (button.dataset.addon) showAddon(button.dataset.addon);
      else if (button.dataset.chapter) startChapter(chapterById.get(button.dataset.chapter), button.dataset.navKey || null, button.dataset.startId || null);
    });
    els.reader.addEventListener('click', event => {
      const button = event.target.closest('button');
      if (!button) return;
      if (button.dataset.valueChoice) goToRouteChoice(button.dataset.valueChoice);
      else if (button.dataset.goChoice) goToChoice(button.dataset.goChoice);
      else if (button.dataset.entryMain) startMain();
      else if (button.dataset.entryExtra) showAddons();
      else if (button.dataset.entryValues) showValues();
      else if (button.dataset.addon) showAddon(button.dataset.addon);
      else if (button.dataset.continueChapter) continueToChapter(button.dataset.continueChapter, button.dataset.continueNavKey || null, button.dataset.continueStartId || null);
    });
    restoreFeatureToggles();
    syncFeatureToggles();
    loadStoryData()
      .then(() => {
        syncFeatureToggles();
        if (!restoreState()) {
          showHome();
        } else {
          draw();
        }
      })
      .catch(error => {
        console.error(error);
        renderLoadError(error);
      });
  </script>
</body>
</html>
